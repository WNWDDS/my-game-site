<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 小游戏中心</title>
  <style>
    /* ===== 全局重置 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #101018;
      color: #fff;
    }
    a {
      text-decoration: none;
      color: #fff;
    }

    /* ===== 顶部导航栏 ===== */
    .top-bar {
      background: #1a1a2e;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #e94560;
      flex-wrap: wrap;
      gap: 10px;
    }
    .top-bar .logo {
      font-size: 24px;
      font-weight: bold;
      color: #e94560;
    }
    .top-bar .logo span {
      color: #fff;
    }
    .top-bar .nav a {
      margin: 0 12px;
      color: #aaa;
      font-size: 14px;
      transition: 0.3s;
    }
    .top-bar .nav a:hover {
      color: #e94560;
    }
    .top-bar .search-box {
      display: flex;
      gap: 0;
    }
    .top-bar .search-box input {
      padding: 6px 14px;
      border: none;
      border-radius: 20px 0 0 20px;
      background: #2a2a4a;
      color: #fff;
      outline: none;
      width: 160px;
    }
    .top-bar .search-box button {
      padding: 6px 16px;
      border: none;
      border-radius: 0 20px 20px 0;
      background: #e94560;
      color: #fff;
      cursor: pointer;
    }
    .top-bar .search-box button:hover {
      background: #ff6b81;
    }

    /* ===== 轮播Banner ===== */
    .banner {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      margin: 20px auto;
      max-width: 1100px;
      border-radius: 16px;
      padding: 40px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid #2a2a4a;
    }
    .banner .text h2 {
      font-size: 28px;
      color: #e94560;
    }
    .banner .text p {
      color: #aaa;
      margin: 10px 0 16px;
      font-size: 15px;
    }
    .banner .text .btn {
      background: #e94560;
      padding: 10px 28px;
      border-radius: 30px;
      font-weight: bold;
      display: inline-block;
      transition: 0.3s;
    }
    .banner .text .btn:hover {
      background: #ff6b81;
      transform: scale(1.05);
    }
    .banner .emoji-big {
      font-size: 70px;
    }

    /* ===== 分类标签 ===== */
    .categories {
      max-width: 1100px;
      margin: 10px auto 20px;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .categories .tag {
      background: #1a1a2e;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 13px;
      color: #aaa;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      transition: 0.3s;
    }
    .categories .tag:hover,
    .categories .tag.active {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }

    /* ===== 游戏网格 ===== */
    .game-section {
      max-width: 1100px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }
    .game-section .section-title {
      font-size: 20px;
      margin-bottom: 18px;
      color: #e94560;
      border-left: 4px solid #e94560;
      padding-left: 14px;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
    }

    /* ===== 游戏卡片 ===== */
    .game-card {
      background: #1a1a2e;
      border-radius: 14px;
      padding: 20px 12px 16px;
      text-align: center;
      transition: 0.3s;
      border: 1px solid #2a2a4a;
      cursor: pointer;
    }
    .game-card:hover {
      transform: translateY(-6px);
      border-color: #e94560;
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.2);
    }
    .game-card .icon {
      font-size: 44px;
      display: block;
      margin-bottom: 8px;
    }
    .game-card .name {
      font-size: 14px;
      font-weight: bold;
    }
    .game-card .desc {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .game-card .play-btn {
      margin-top: 10px;
      background: #e94560;
      border: none;
      color: #fff;
      padding: 4px 18px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    .game-card .play-btn:hover {
      background: #ff6b81;
    }

    /* ===== 空状态 ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .empty-state .big {
      font-size: 60px;
      display: block;
      margin-bottom: 16px;
    }
    .empty-state h3 {
      color: #888;
    }
    .empty-state code {
      background: #1a1a2e;
      padding: 4px 12px;
      border-radius: 4px;
      color: #e94560;
    }

    /* ===== 页脚 ===== */
    .footer {
      text-align: center;
      padding: 30px;
      color: #444;
      font-size: 13px;
      border-top: 1px solid #1a1a2e;
    }

    /* ===== 弹窗 ===== */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.88);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .overlay.show {
      display: flex;
    }
    .modal {
      background: #1a1a2e;
      border-radius: 16px;
      width: 95%;
      max-width: 820px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      border: 1px solid #333;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #0d0d1a;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      border-radius: 16px 16px 0 0;
    }
    .modal-header #gameTitle {
      font-size: 16px;
      font-weight: bold;
    }
    .close-btn {
      background: #e94560;
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }
    .close-btn:hover {
      background: #ff6b81;
    }
    .modal iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #0d0d1a;
      border-radius: 0 0 16px 16px;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {

        flex-direction: column;
        align-items: stretch;
        padding: 12px 16px;

        gap: 6px;
      }

        margin: 0 6px;

        width: 120px;

        padding: 25px 18px;
      }
