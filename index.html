<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>小游戏平台</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* 顶部栏 */
    .top {
      background: #ff4d4d;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* 分类栏 */
    .nav {
      background: white;
      padding: 10px;
      text-align: center;
    }

    .nav span {
      margin: 0 10px;
      padding: 5px 10px;
      background: #eee;
      border-radius: 5px;
      cursor: pointer;
    }

    /* 游戏区 */
    .container {
      padding: 20px;
      text-align: center;
    }

    .game {
      display: inline-block;
      width: 180px;
      margin: 10px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 10px;
    }

    .game button {
      margin-top: 10px;
      padding: 6px 10px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .game button:hover {
      background: #e60000;
    }
  </style>
</head>

<body>

<div class="top">🎮 4399小游戏风格站</div>

<div class="nav">
  <span>推荐</span>
  <span>动作</span>
  <span>休闲</span>
  <span>益智</span>
</div>

<div class="container">

  <h3>贪吃蛇</h3>
  <p>经典小游戏</p >
  <a href=" ">
    <button>开始</button>
  </a >
</div>
  <div class="game">
    <h3>贪吃蛇</h3>
    <p>经典小游戏</p >
    <a href=" ">
      <button>开始</button>
    </a >
  </div>

  <div class="game">
    <h3>俄罗斯方块</h3>
    <p>挑战反应</p >
    <a href="tetris.html">
      <button>开始</button>
    </a >
  </div>

  <div class="game">
    <h3>跳一跳</h3>
    <p>休闲小游戏</p >
    <a href="jump.html">
      <button>开始</button>
    </a >
  </div>

</div>

</body>
</html>
