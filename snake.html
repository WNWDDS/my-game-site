<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-wrapper {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #2a2a4a;
            text-align: center;
        }
        .game-wrapper h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .info {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 12px;
            padding: 0 5px;
        }
        .info span {
            color: #fff;
            font-weight: bold;
        }
        canvas {
            background: #0d0d1a;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1/1;
        }
        .controls {
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
        }
        .controls kbd {
            background: #2a2a4a;
            padding: 4px 10px;
            border-radius: 4px;
            color: #fff;
            font-size: 0.8rem;
            margin: 0 2px;
        }
        #restartBtn {
            margin-top: 12px;
            background: #e94560;
            border: none;
            color: #fff;
            padding: 8px 30px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        #restartBtn:hover {
            background: #ff6b81;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <h2>🐍 贪吃蛇</h2>
    <div class="info">
        <div>🏆 得分: <span id="scoreDisplay">0</span></div>
        <div>📏 长度: <span id="lengthDisplay">1</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="restartBtn">🔄 重新开始</button>
    <div class="controls">
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向
    </div>
</div>

<script>
    // ============================================================
    //  游戏核心代码
    // ============================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const lengthSpan = document.getElementById('lengthDisplay');
    const restartBtn = document.getElementById('restartBtn');

    const GRID_SIZE = 20;          // 20x20 网格
    const TILE_SIZE = canvas.width / GRID_SIZE;

    let snake, food, dx, dy, score, gameOver, gameLoopInterval;

    // ----- 初始化 -----
    function initGame() {
        // 蛇：初始在中间，朝右
        const mid = Math.floor(GRID_SIZE / 2);
        snake = [
            { x: mid, y: mid },
            { x: mid - 1, y: mid },
            { x: mid - 2, y: mid }
        ];
        dx = 1;
        dy = 0;
        score = 0;
        gameOver = false;
        restartBtn.style.display = 'none';
        spawnFood();
        updateInfo();
    }

    // ----- 生成食物（避开蛇身）-----
    function spawnFood() {
        let pos;
        let attempts = 0;
        do {
            pos = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
            attempts++;
        } while (isOnSnake(pos.x, pos.y) && attempts < 500);
        food = pos;
    }

    function isOnSnake(x, y) {
        return snake.some(seg => seg.x === x && seg.y === y);
    }

    // ----- 更新UI信息 -----
    function updateInfo() {
        scoreSpan.textContent = score;
        lengthSpan.textContent = snake.length;
    }

    // ----- 游戏更新（每一帧）-----
    function update() {
        if (gameOver) return;

        // 计算新蛇头
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 检查是否吃到食物
        const ate = (head.x === food.x && head.y === food.y);

        // 构建新蛇
        let newSnake = [head, ...snake];
        if (!ate) {
            newSnake.pop(); // 没吃到移除尾
        }

        // ---- 碰撞检测 ----
        // 撞墙
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
            endGame();
            return;
        }
        // 撞自己（新蛇头不能和后面的重复，但要排除头本身）
        for (let i = 1; i < newSnake.length; i++) {
            if (newSnake[i].x === head.x && newSnake[i].y === head.y) {
                endGame();
                return;
            }
        }

        // 更新蛇
        snake = newSnake;

        if (ate) {
            score++;
            updateInfo();
            spawnFood();
        }

        updateInfo();
    }

    // ----- 结束游戏 -----
    function endGame() {
        gameOver = true;
        restartBtn.style.display = 'inline-block';
    }

    // ----- 绘制画面 -----
    function draw() {
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 绘制网格线（很淡）
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * TILE_SIZE, 0);
            ctx.lineTo(i * TILE_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * TILE_SIZE);
            ctx.lineTo(canvas.width, i * TILE_SIZE);
            ctx.stroke();
        }

        // 绘制蛇
        snake.forEach((seg, index) => {
            const x = seg.x * TILE_SIZE;
            const y = seg.y * TILE_SIZE;
            const padding = 2;
            // 蛇头用亮色
            const color = index === 0 ? '#e94560' : '#c0392b';
            ctx.fillStyle = color;
            ctx.fillRect(x + padding, y + padding, TILE_SIZE - padding * 2, TILE_SIZE - padding * 2);
            // 蛇头加眼睛
            if (index === 0) {
                ctx.fillStyle = '#fff';
                const eyeSize = 3;
                let ex1, ey1, ex2, ey2;
                if (dx === 1) { ex1 = x+12; ey1 = y+5; ex2 = x+12; ey2 = y+15; }
                else if (dx === -1) { ex1 = x+5; ey1 = y+5; ex2 = x+5; ey2 = y+15; }
                else if (dy === -1) { ex1 = x+5; ey1 = y+5; ex2 = x+15; ey2 = y+5; }
                else if (dy === 1) { ex1 = x+5; ey1 = y+12; ex2 = x+15; ey2 = y+12; }
                ctx.beginPath();
                ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2);
